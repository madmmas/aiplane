server:
  port: 8080

spring:
  application:
    name: aiplane-api-server
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/aimanager}
    username: ${DB_USERNAME:aimanager}
    password: ${DB_PASSWORD:changeme}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/seed
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    dev.madmmas.aimanager: DEBUG
    org.flywaydb: INFO
