server:
  port: 8080

spring:
  application:
    name: aiplane-api-server
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/aimanager}
    username: ${DB_USERNAME:aimanager}
    password: ${DB_PASSWORD:changeme}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/seed
    baseline-on-migrate: true
  ai:
    # Optional — empty keys skip ChatModel bean creation (app still boots).
    openai:
      api-key: ${OPENAI_API_KEY:}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}

aiplane:
  playground:
    timeout: 30s
  # USD per 1K tokens — override / extend per environment without code changes.
  cost-rates:
    rates:
      - model: claude-sonnet-4-20250514
        input-usd-per-1k: 0.003
        output-usd-per-1k: 0.015
      - model: claude-haiku-4-20250414
        input-usd-per-1k: 0.0008
        output-usd-per-1k: 0.004
      - model: gpt-4o
        input-usd-per-1k: 0.0025
        output-usd-per-1k: 0.01
      - model: gpt-4o-mini
        input-usd-per-1k: 0.00015
        output-usd-per-1k: 0.0006


management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    dev.madmmas.aimanager: DEBUG
    org.flywaydb: INFO
