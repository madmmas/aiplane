server:
  port: 8888

spring:
  application:
    name: aiplane-config-server
  profiles:
    # native = classpath:/config for local scaffold; switch to git/jdbc later (#17)
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config
        git:
          uri: ${CONFIG_GIT_URI:https://github.com/madmmas/aiplane-config}
          default-label: main
          search-paths: "{application}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
  endpoint:
    health:
      show-details: when_authorized
