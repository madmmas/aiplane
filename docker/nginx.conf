server {
    listen 80;
    server_name _;

    # Host dashboard
    location / {
        root /usr/share/nginx/html/dashboard;
        try_files $uri $uri/ /index.html;
    }

    # Federated remotes (same-origin paths baked into the dashboard build)
    location /remotes/prompt-manager/ {
        alias /usr/share/nginx/html/remotes/prompt-manager/;
        try_files $uri =404;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=60";
    }

    location /remotes/guardrail/ {
        alias /usr/share/nginx/html/remotes/guardrail/;
        try_files $uri =404;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=60";
    }

    location /remotes/user-manager/ {
        alias /usr/share/nginx/html/remotes/user-manager/;
        try_files $uri =404;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=60";
    }

    location /remotes/usages-data/ {
        alias /usr/share/nginx/html/remotes/usages-data/;
        try_files $uri =404;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=60";
    }
}
