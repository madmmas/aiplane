version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    # Major upgrades for these need coordinated migration PRs (config / peer deps).
    ignore:
      - dependency-name: "@biomejs/biome"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Keep GitHub Actions used by CI / Dependabot itself on a weekly patch cadence.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
