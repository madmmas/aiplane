name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Required branch-protection check (name must stay `ci`).
  # lint → typecheck → test → build; a failing Vitest suite blocks merges.
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: |
            apps/*/coverage/**
            packages/*/coverage/**
          if-no-files-found: warn
          retention-days: 14

      - name: Build
        run: pnpm build

  # Runs Surefire unit tests + Failsafe Testcontainers ITs + JaCoCo via `mvn verify`.
  # Docker is available on ubuntu-latest for Testcontainers Postgres.
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Backend verify (unit + Testcontainers IT + JaCoCo)
        run: mvn -f backend/pom.xml -B verify

      - name: Upload backend JaCoCo coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-coverage
          path: |
            backend/*/target/site/jacoco/**
          if-no-files-found: warn
          retention-days: 14
