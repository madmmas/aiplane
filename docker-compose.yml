services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aimanager
      POSTGRES_USER: aimanager
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimanager -d aimanager"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - aiplane

  config-server:
    build:
      context: ./backend
      dockerfile: config-server/Dockerfile
    ports:
      - "8888:8888"
    environment:
      # native works today; jdbc/git land fully in Phase 5 (#17)
      SPRING_PROFILES_ACTIVE: ${CONFIG_MODE:-native}
      CONFIG_MODE: ${CONFIG_MODE:-native}
      CONFIG_GIT_URI: ${CONFIG_GIT_URI:-https://github.com/madmmas/aiplane-config}
      DATABASE_URL: jdbc:postgresql://postgres:5432/aimanager
      DB_USERNAME: aimanager
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - aiplane

  api-server:
    build:
      context: ./backend
      dockerfile: api-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/aimanager
      DB_USERNAME: aimanager
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      CONFIG_SERVER_URL: http://config-server:8888
      JWT_SECRET: ${JWT_SECRET:-change-me-min-32-chars-please!!}
      SECRET_KEY: ${SECRET_KEY:-change-me-for-encrypting-provider-keys}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - aiplane

  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_APP_ENV: production
    depends_on:
      api-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - aiplane

volumes:
  pgdata:

networks:
  aiplane:
    driver: bridge
